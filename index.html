<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>NotebookLM-for-Windows v2</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        background-color: #f3e8f8; /* Light Lavender */
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }
      /* Custom Title Bar */
      #titlebar {
        height: 32px;
        background: linear-gradient(90deg, #6B21A8, #8b3cce); /* Deep Purple Gradient */
        color: white;
        display: flex;
        align-items: center;
        justify-content: space-between;
        -webkit-app-region: drag; /* Makes the title bar draggable */
        user-select: none;
      }
      #titlebar-left {
        display: flex;
        align-items: center;
        padding-left: 10px;
        gap: 10px;
      }
      #titlebar-title {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.5px;
      }
      #titlebar-middle {
        display: flex;
        align-items: center;
        gap: 15px;
        -webkit-app-region: no-drag;
      }
      .control-group {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 12px;
      }
      #opacity-slider {
        width: 80px;
        accent-color: #fce8e6;
        cursor: pointer;
      }
      .tbtn {
        background: rgba(255, 255, 255, 0.15);
        border: none;
        color: white;
        padding: 3px 8px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 11px;
        font-weight: bold;
        transition: background 0.2s;
      }
      .tbtn:hover {
        background: rgba(255, 255, 255, 0.3);
      }
      #titlebar-right {
        display: flex;
        -webkit-app-region: no-drag;
        height: 100%;
      }
      .win-btn {
        width: 40px;
        background: transparent;
        border: none;
        color: white;
        font-size: 14px;
        cursor: pointer;
        transition: background 0.2s;
      }
      .win-btn:hover {
        background: rgba(255, 255, 255, 0.2);
      }
      #close-btn:hover {
        background: #e81123;
      }

      /* Main container (split view support) */
      #app-container {
        flex: 1;
        display: flex;
        transition: all 0.3s ease;
      }
      
      .view-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        border-right: 1px solid #d1b3e8; /* subtle divider */
      }
      
      .view-container.hidden {
        display: none;
      }
      
      webview {
        flex: 1;
        width: 100%;
        height: 100%;
      }
      
      /* Footer */
      footer {
        height: 40px;
        background: linear-gradient(90deg, #3a1072, #5a189a); /* Darker Purple Gradient */
        border-top: 1px solid #380b6b;
        padding: 0 15px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        color: #e0e1dd;
        user-select: none;
        position: relative;
      }
      footer a {
        color: #d1b3e8; /* Light purple link */
        text-decoration: none;
        cursor: pointer;
        font-weight: bold;
        transition: color 0.2s;
      }
      footer a:hover {
        color: #f3e8f8;
        text-decoration: underline;
      }
      .footer-side-left {
        position: absolute;
        left: 15px;
        display: flex;
        align-items: center;
      }
      .footer-center {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .footer-side-right {
        position: absolute;
        right: 15px;
        display: flex;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <!-- Custom Title Bar -->
    <div id="titlebar">
      <div id="titlebar-left">
        <span id="titlebar-title">NotebookLM-for-Windows v2</span>
      </div>
      <div id="titlebar-middle">
        <label class="control-group" title="Ghost Mode (Transparency)">
          Opacity
          <input type="range" id="opacity-slider" min="0.2" max="1.0" step="0.05" value="1.0">
        </label>
        <button id="split-toggle" class="tbtn">Split View</button>
      </div>
      <div id="titlebar-right">
        <button class="win-btn" id="min-btn">&#xE921;</button>
        <button class="win-btn" id="max-btn">&#xE922;</button>
        <button class="win-btn" id="close-btn">&#xE8BB;</button>
      </div>
    </div>

    <div id="app-container">
      <!-- NotebookLM WebView 1 -->
      <div class="view-container" id="view1-container">
        <webview
          id="notebookView1"
          src="https://notebooklm.google.com/"
          partition="persist:notebooklm"
          preload="./webview-preload.js"
          allowpopups
        ></webview>
      </div>

      <!-- NotebookLM WebView 2 (Split View) -->
      <div class="view-container hidden" id="view2-container">
        <webview
          id="notebookView2"
          src="https://notebooklm.google.com/"
          partition="persist:notebooklm"
          preload="./webview-preload.js"
          allowpopups
        ></webview>
      </div>
    </div>

    <footer>
      <div class="footer-side-left">
        <label style="cursor: pointer; display: flex; align-items: center; gap: 4px; font-size: 11px;" title="Launch app on system startup">
          <input type="checkbox" id="autoLaunchToggle" /> Auto-Launch
        </label>
      </div>
      <div class="footer-center">
        <div class="branding">
          built with <span style="color: #ff006e;">&hearts;</span> by 
          <a href="#" onclick="openLink('https://www.linkedin.com/in/gyanesh-samanta/')">Gyanesh Samanta</a>
        </div>
        <span style="opacity: 0.5; font-size: 12px; margin: 0 5px;">|</span>
        <span style="font-size: 12px; color: #f3e8f8; font-weight: 500;">Follow for more:</span>
        <a href="#" onclick="openLink('https://www.linkedin.com/newsletters/gyanesh-on-product-6979386586404651008/')">Newsletter</a>
        <a href="#" onclick="openLink('https://github.com/GyaneshSamanta')">GitHub</a>
      </div>
      <div class="footer-side-right">
        <a href="#" onclick="openLink('https://buymeachai.ezee.li/GyaneshOnProduct')" style="background: #FFDD00; color: #000; padding: 4px 10px; border-radius: 4px; text-decoration: none; font-weight: bold; font-size: 12px;">☕ Buy Me A Chai</a>
      </div>
    </footer>
    <script src="renderer.js"></script>
    <script>
      document.getElementById('min-btn').innerText = '—';
      document.getElementById('max-btn').innerText = '□';
      document.getElementById('close-btn').innerText = '✕';
    </script>
  </body>
</html>
